version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/wisemove
      - PORT=5000
    depends_on:
      - mongodb
    networks:
      - wisemove-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - wisemove-network

networks:
  wisemove-network:
    driver: bridge

volumes:
  mongodb_data:
